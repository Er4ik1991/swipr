    <style>
      /* ── Design tokens ── */
      :root {
        /* Colors (light) */
        --c-paper:     #FBFAF7;

        --c-muted:     #6F6A7A;
        --c-line:      #ECE8E1;
        --c-apply:     #13B17C;
        --c-brand:     #6C5CE7;

        --sp-1: 4px;  --sp-2: 8px;  --sp-3: 12px;
